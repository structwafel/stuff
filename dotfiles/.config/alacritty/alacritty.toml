# Unified terminal config — see also: foot, kitty, wezterm, ghostty
# Font: NotoMono Nerd Font 12 · Theme: Gruvbox dark hard (base16) · pad 0

[font]
size = 12.0

[font.normal]
family = "NotoMono Nerd Font"
style = "Regular"

[window]
padding = { x = 0, y = 0 }
dynamic_padding = false
decorations = "None"

[bell]
duration = 0

# Gruvbox dark, hard (base16, saturated) — shared canonical palette
[colors.primary]
background = "#1d2021"
foreground = "#ebdbb2"

[colors.cursor]
text = "#665c54"
cursor = "#bdae93"

[colors.selection]
text = "#ebdbb2"
background = "#d65d0e"

[colors.normal]
black   = "#282828"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#fbf1c7"

# Ctrl+V pastes everywhere (Ctrl+Shift+C still copies; no "smart Ctrl+C" here)
[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"
