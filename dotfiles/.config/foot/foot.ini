# Unified terminal config — see also: kitty, wezterm, ghostty, alacritty
# Font: NotoMono Nerd Font 12 · Theme: Gruvbox dark hard (base16) · pad 0

[main]
font=NotoMono Nerd Font:size=12
pad=0x0
# Copy to clipboard on selection (matches kitty/wezterm feel)
selection-target=clipboard

# [cursor]
# color=1d2021 bdae93

[bell]
urgent=no
visual=no
notify=no

[key-bindings]
# Ctrl+V pastes everywhere (foot has no "smart Ctrl+C"; use Ctrl+Shift+C to copy)
clipboard-paste=Control+v Control+Shift+v
clipboard-copy=Control+Shift+c

[colors-dark]
# Gruvbox dark, hard (base16 - saturated). Shared canonical palette.
background=1d2021
foreground=ebdbb2
selection-foreground=ebdbb2
selection-background=d65d0e

# Normal colors (using bright/saturated variants)
regular0=282828  # black
regular1=fb4934  # red
regular2=b8bb26  # green
regular3=fabd2f  # yellow
regular4=83a598  # blue
regular5=d3869b  # magenta
regular6=8ec07c  # cyan
regular7=ebdbb2  # white

# Bright colors
bright0=928374   # bright black
bright1=fb4934   # bright red
bright2=b8bb26   # bright green
bright3=fabd2f   # bright yellow
bright4=83a598   # bright blue
bright5=d3869b   # bright magenta
bright6=8ec07c   # bright cyan
bright7=fbf1c7   # bright white
