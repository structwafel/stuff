<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Add Noto Color Emoji as a last-resort fallback so emoji codepoints
       that the primary family lacks are rendered by the emoji font instead
       of showing tofu. Uses <default> (append) to avoid hijacking dual-use
       characters (digits, ©, ™, ▪, keycaps, …) into emoji presentation. -->
  <alias binding="strong">
    <family>sans-serif</family>
    <default><family>Noto Color Emoji</family></default>
  </alias>
  <alias binding="strong">
    <family>serif</family>
    <default><family>Noto Color Emoji</family></default>
  </alias>
  <alias binding="strong">
    <family>monospace</family>
    <default><family>Noto Color Emoji</family></default>
  </alias>
</fontconfig>
